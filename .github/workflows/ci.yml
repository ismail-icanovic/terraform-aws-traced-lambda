  apply-and-cleanup:
#    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on:
      - codebuild-terraform-aws-modules-${{ github.run_id }}-${{ github.run_attempt }}
      - image:arm-lambda-nodejs24
      - instance-size:4GB
    env:
      AWS_REGION: us-west-2
      AWS_DEFAULT_REGION: us-west-2
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init (Tests)
        working-directory: tests
        run: terraform init

      - name: Prepare CI Context
        run: |
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGION="${AWS_REGION}"
          BUCKET="terraform-modules-${ACCOUNT_ID}-${REGION}"

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION"
          fi

#      - name: Cleanup Previous Test Resources
