name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on:
      - codebuild-terraform-aws-modules-${{ github.run_id }}-${{ github.run_attempt }}
      - image:arm-lambda-nodejs24
      - instance-size:4GB
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        working-directory: tests
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: tests
        run: terraform validate

  apply-and-cleanup:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on:
      - codebuild-terraform-aws-modules-${{ github.run_id }}-${{ github.run_attempt }}
      - image:arm-lambda-nodejs24
      - instance-size:4GB
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init (Tests)
        working-directory: tests
        run: terraform init

      - name: Terraform Apply (Tests)
        working-directory: tests
        run: terraform apply -auto-approve -lock=false

      - name: Cleanup Tests
        if: always()
        working-directory: tests
        run: terraform destroy -auto-approve -lock=false

  release:
    needs: apply-and-cleanup
    if: github.ref == 'refs/heads/main'
    runs-on:
      - codebuild-terraform-aws-modules-${{ github.run_id }}-${{ github.run_attempt }}
      - image:arm-lambda-nodejs24
      - instance-size:4GB
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$latest" >> $GITHUB_OUTPUT

      - name: Bump version
        id: version
        run: |
          latest=${{ steps.tag.outputs.latest }}
          major=$(echo $latest | cut -d. -f1 | tr -d 'v')
          minor=$(echo $latest | cut -d. -f2)
          patch=$(echo $latest | cut -d. -f3)
          new_patch=$((patch + 1))
          new_version="v${major}.${minor}.${new_patch}"
          echo "version=$new_version" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## terraform-aws-traced-lambda ${{ steps.version.outputs.version }}

            ### Usage
            ```hcl
            module "my_lambda" {
              source = "github.com/ismail-icanovic/terraform-aws-traced-lambda//modules/traced_python_lambda?ref=${{ steps.version.outputs.version }}"

              function_name = "my-function"
              handler       = "app.handler"
              runtime       = "python3.13"
              architecture  = "arm64"
              environment   = "prod"
            }
            ```
