#            aws logs delete-log-group --region "$AWS_REGION" --log-group-name "$lg" 2>/dev/null || true
#          done

      - name: Terraform Plan (Tests)
        working-directory: tests
        run: |
          set -euo pipefail
          terraform plan -lock=false -out=tfplan
          terraform show tfplan | sed -n '1,120p'

      - name: Terraform Apply (Tests)
        working-directory: tests
        run: terraform apply -auto-approve -lock=false -parallelism=1

      - name: Invoke Lambda Smoke Tests
        run: |
          set -euo pipefail

          invoke_and_assert() {
            local fn="$1"
            local payload="$2"
            local resp_file
            local invoke_meta

            resp_file="$(mktemp)"
            invoke_meta="$(aws lambda invoke \
              --region "$AWS_REGION" \
              --function-name "$fn" \
              --payload "$payload" \
              --cli-binary-format raw-in-base64-out \
              "$resp_file")"

            if echo "$invoke_meta" | grep -q '"FunctionError"'; then
              echo "Lambda '$fn' returned FunctionError"
              echo "$invoke_meta"
              cat "$resp_file"
              rm -f "$resp_file"
              return 1
            fi

            python3 - "$fn" "$resp_file" <<'PY'
            import json
            import pathlib
            import sys
            
            fn = sys.argv[1]
            resp_path = pathlib.Path(sys.argv[2])
            payload = json.loads(resp_path.read_text() or "{}")
            status = payload.get("statusCode")
            if status != 200:
                print(f"Lambda '{fn}' returned unexpected statusCode: {status}")
                print(json.dumps(payload, indent=2))
                sys.exit(1)
            print(f"Lambda '{fn}' ok (statusCode=200)")
            PY

            rm -f "$resp_file"
          }

          invoke_and_assert "hello-world" '{"name":"ci"}'
          invoke_and_assert "data-processor" '{"operation":"sum","items":[1,2,3]}'
          invoke_and_assert "api-handler" '{"httpMethod":"GET","path":"/health"}'
          invoke_and_assert "test-basic" '{}'
          invoke_and_assert "test-no-layer" '{}'
          invoke_and_assert "test-anomaly" '{"level":"WARN"}'
          invoke_and_assert "test-policies" '{"action":"read"}'

      - name: Cleanup Tests
        if: always()
        working-directory: tests
        run: terraform destroy -auto-approve -lock=false -parallelism=1

  release:
    needs: apply-and-cleanup
    if: github.ref == 'refs/heads/main'
    runs-on:
      - codebuild-terraform-aws-modules-${{ github.run_id }}-${{ github.run_attempt }}
      - image:arm-lambda-nodejs24
      - instance-size:4GB
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$latest" >> $GITHUB_OUTPUT

      - name: Bump version
        id: version
        run: |
          latest=${{ steps.tag.outputs.latest }}
          major=$(echo $latest | cut -d. -f1 | tr -d 'v')
          minor=$(echo $latest | cut -d. -f2)
          patch=$(echo $latest | cut -d. -f3)
          new_patch=$((patch + 1))
          new_version="v${major}.${minor}.${new_patch}"
          echo "version=$new_version" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## terraform-aws-traced-lambda ${{ steps.version.outputs.version }}

            ### Usage
            ```hcl
            module "my_lambda" {
              source = "github.com/ismail-icanovic/terraform-aws-traced-lambda//modules/traced_python_lambda?ref=${{ steps.version.outputs.version }}"

              function_name = "my-function"
              handler       = "app.handler"
              runtime       = "python3.13"
              architecture  = "arm64"
              environment   = "prod"
            }
            ```
