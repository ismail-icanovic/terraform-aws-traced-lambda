name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Checkov
        run: pip install checkov

      - name: Install TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        working-directory: modules/traced_python_lambda
        run: tflint --init && tflint --call-module-type=all || true

      - name: Run Checkov
        run: checkov -d modules/traced_python_lambda --framework terraform || true

  validate:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        working-directory: tests
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: tests
        run: terraform validate

  release:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$latest" >> $GITHUB_OUTPUT

      - name: Bump version
        id: version
        run: |
          latest=${{ steps.tag.outputs.latest }}
          major=$(echo $latest | cut -d. -f1 | tr -d 'v')
          minor=$(echo $latest | cut -d. -f2)
          patch=$(echo $latest | cut -d. -f3)
          new_patch=$((patch + 1))
          new_version="v${major}.${minor}.${new_patch}"
          echo "version=$new_version" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes "## terraform-aws-traced-lambda ${{ steps.version.outputs.version }}

            ### Usage
            \`\`\`hcl
            module \"my_lambda\" {
              source = \"github.com/ismail-icanovic/terraform-aws-traced-lambda//modules/traced_python_lambda?ref=${{ steps.version.outputs.version }}\"

              function_name = \"my-function\"
              handler       = \"app.handler\"
              runtime       = \"python3.13\"
              architecture  = \"arm64\"
              environment   = \"prod\"
            }
            \`\`\`"
