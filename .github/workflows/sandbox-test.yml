name: Sandbox Test

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - basic
          - vpc
          - policies

jobs:
  sandbox-test:
    runs-on:
      - codebuild-terraform-aws-modules-${{ github.run_id }}-${{ github.run_attempt }}
      - image:arm-lambda-nodejs24
      - instance-size:4GB
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init (Tests)
        working-directory: tests
        run: terraform init

      - name: Terraform Plan (Tests)
        working-directory: tests
        run: |
          terraform plan -lock=false -var="vpc_enabled=false" 2>&1 | head -100

      - name: Apply Test Suite
        if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'basic'
        working-directory: tests
        run: |
          terraform apply -auto-approve -lock=false -target=module.test_basic
          aws lambda invoke --region us-west-2 --function-name test-basic /tmp/test_basic.json
          echo "Test Basic: $(cat /tmp/test_basic.json)"

      - name: Apply Test No Layer
        if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'basic'
        working-directory: tests
        run: |
          terraform apply -auto-approve -lock=false -target=module.test_no_layer
          aws lambda invoke --region us-west-2 --function-name test-no-layer /tmp/test_no_layer.json
          echo "Test No Layer: $(cat /tmp/test_no_layer.json)"

      - name: Apply Test Anomaly
        if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'basic'
        working-directory: tests
        run: |
          terraform apply -auto-approve -lock=false -target=module.test_anomaly
          aws lambda invoke --region us-west-2 --function-name test-anomaly /tmp/test_anomaly.json
          echo "Test Anomaly: $(cat /tmp/test_anomaly.json)"

      - name: Cleanup Tests
        if: always()
        working-directory: tests
        run: terraform destroy -auto-approve -lock=false
